<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Lab Portal | بوابة علوم المختبرات الطبية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a2540; --accent: #00b4d8; --accent2: #06d6a0;
            --danger: #ef233c; --warning: #fb8500;
            --bg: #f0f4f8; --surface: #ffffff; --surface2: #f7fafc;
            --text: #1a202c; --text-muted: #718096; --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(10,37,64,0.10); --shadow-lg: 0 8px 40px rgba(10,37,64,0.16);
            --radius: 16px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; }
        html[lang="ar"] body { font-family: 'IBM Plex Sans Arabic','Tajawal',sans-serif; }
        html[lang="en"] body { font-family: 'DM Sans',sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; }

        /* LANG BAR */
        .lang-bar { background: var(--primary); padding: 8px 0; }
        html[lang="ar"] .lang-bar .container { text-align: right; }
        html[lang="en"] .lang-bar .container { text-align: left; }
        .lang-toggle {
            display: inline-flex; align-items: center;
            background: rgba(255,255,255,0.1); border-radius: 100px;
            padding: 4px; gap: 2px; border: 1px solid rgba(255,255,255,0.15);
        }
        .lang-btn {
            padding: 5px 16px; border-radius: 100px; border: none;
            background: transparent; color: rgba(255,255,255,0.55);
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .lang-btn.active { background: var(--accent); color: white; }
        .lang-btn:hover:not(.active) { color: white; }

        /* HERO */
        .hero {
            background: var(--primary);
            background-image: radial-gradient(ellipse at 20% 50%, rgba(0,180,216,0.18) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, rgba(6,214,160,0.12) 0%, transparent 50%);
            color: white; padding: 56px 0 80px; position: relative; overflow: hidden;
        }
        .hero::before {
            content:''; position:absolute; inset:0;
            background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='2' fill='%2300b4d8' fill-opacity='0.04'/%3E%3C/svg%3E");
            pointer-events:none;
        }
        .hero-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(0,180,216,0.15); border:1px solid rgba(0,180,216,0.35);
            color:var(--accent); padding:6px 16px; border-radius:100px;
            font-size:0.82rem; font-weight:500; margin-bottom:20px;
        }
        .hero h1 {
            font-weight:900; font-size:clamp(1.8rem,4vw,2.8rem);
            line-height:1.2; margin-bottom:14px;
        }
        html[lang="ar"] .hero h1 { font-family:'Tajawal',sans-serif; }
        html[lang="en"] .hero h1 { font-family:'Syne',sans-serif; letter-spacing:-1px; }
        .hero h1 span { color:var(--accent); }
        .hero p { color:rgba(255,255,255,0.72); font-size:1.05rem; max-width:560px; margin:0 auto 28px; }
        .hero-stats { display:flex; justify-content:center; gap:32px; margin-top:36px; flex-wrap:wrap; }
        .hero-stat .num {
            display:block; font-weight:900; font-size:2rem; color:var(--accent); line-height:1;
        }
        html[lang="ar"] .hero-stat .num { font-family:'Tajawal',sans-serif; }
        html[lang="en"] .hero-stat .num { font-family:'Syne',sans-serif; }
        .hero-stat .lbl { display:block; font-size:0.78rem; color:rgba(255,255,255,0.55); margin-top:4px; }
        .hero-divider { width:1px; background:rgba(255,255,255,0.12); align-self:stretch; }
        .telegram-btn {
            display:inline-flex; align-items:center; gap:10px;
            background:#0088cc; color:white; padding:12px 24px; border-radius:100px;
            text-decoration:none; font-weight:600; font-size:0.9rem; transition:all 0.25s;
            box-shadow:0 4px 16px rgba(0,136,204,0.35);
        }
        .telegram-btn:hover { background:#006699; color:white; transform:translateY(-2px); }

        /* NAV */
        .main-nav-wrap {
            background:var(--surface); border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(10,37,64,0.06);
        }
        .main-nav { display:flex; gap:4px; padding:12px 0; justify-content:center; flex-wrap:wrap; }
        .nav-btn {
            display:flex; align-items:center; gap:8px; padding:10px 22px;
            border:none; background:transparent; color:var(--text-muted);
            font-weight:500; font-size:0.92rem; border-radius:100px; cursor:pointer; transition:all 0.2s;
        }
        html[lang="ar"] .nav-btn { font-family:'IBM Plex Sans Arabic',sans-serif; }
        html[lang="en"] .nav-btn { font-family:'DM Sans',sans-serif; }
        .nav-btn:hover { background:var(--surface2); color:var(--primary); }
        .nav-btn.active { background:var(--primary); color:white; box-shadow:0 4px 14px rgba(10,37,64,0.25); }

        .tab-pane { display:none; }
        .tab-pane.active { display:block; }

        /* SEARCH */
        .search-section { background:var(--surface); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); margin-bottom:24px; }
        .search-title { font-size:0.78rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:14px; }
        .search-input-wrap { position:relative; }
        .search-icon { position:absolute; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:1rem; }
        html[lang="ar"] .search-icon { right:16px; }
        html[lang="en"] .search-icon { left:16px; }
        .search-input {
            width:100%; border:2px solid var(--border); border-radius:var(--radius-sm);
            font-size:0.95rem; background:var(--surface2); color:var(--text);
            transition:border-color 0.2s,box-shadow 0.2s; outline:none;
        }
        html[lang="ar"] .search-input { padding:13px 44px 13px 16px; font-family:'IBM Plex Sans Arabic',sans-serif; }
        html[lang="en"] .search-input { padding:13px 16px 13px 44px; font-family:'DM Sans',sans-serif; }
        .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(0,180,216,0.12); background:white; }
        .filter-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
        .chip {
            padding:6px 16px; border-radius:100px; border:1.5px solid var(--border);
            background:var(--surface2); color:var(--text-muted); font-size:0.8rem; font-weight:500;
            cursor:pointer; transition:all 0.2s;
        }
        html[lang="ar"] .chip { font-family:'IBM Plex Sans Arabic',sans-serif; }
        html[lang="en"] .chip { font-family:'DM Sans',sans-serif; }
        .chip:hover { border-color:var(--accent); color:var(--accent); }
        .chip.active { background:var(--primary); border-color:var(--primary); color:white; }
        .results-count { font-size:0.82rem; color:var(--text-muted); margin-top:12px; }
        .results-count strong { color:var(--accent); }

        /* TABLE */
        .table-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
        .lab-table { margin:0; font-size:0.88rem; }
        .lab-table thead th {
            background:var(--primary); color:rgba(255,255,255,0.85);
            font-weight:600; padding:14px 16px; border:none; font-size:0.82rem; white-space:nowrap;
        }
        .lab-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
        .lab-table tbody tr:hover { background:#f0f9ff; }
        .lab-table tbody tr:last-child { border-bottom:none; }
        .lab-table td { padding:13px 16px; vertical-align:middle; border:none; }
        .test-name { font-weight:600; color:var(--primary); line-height:1.3; }
        .cat-badge {
            display:inline-flex; align-items:center; gap:5px; padding:4px 10px;
            border-radius:100px; font-size:0.72rem; font-weight:600; white-space:nowrap;
        }
        .cat-Hematology{background:#fce4ec;color:#c62828} .cat-Chemistry{background:#e3f2fd;color:#1565c0}
        .cat-Hormones{background:#f3e5f5;color:#6a1b9a} .cat-Coagulation{background:#fbe9e7;color:#bf360c}
        .cat-Immunology{background:#e8f5e9;color:#2e7d32} .cat-Microbiology{background:#fff3e0;color:#e65100}
        .cat-TumorMarkers{background:#fce4ec;color:#880e4f} .cat-Genetic{background:#e8eaf6;color:#283593}
        .cat-Toxicology{background:#efebe9;color:#4e342e} .cat-BloodBank{background:#ffebee;color:#b71c1c}
        .cat-Urinalysis{background:#fffde7;color:#f57f17}
        .sample-badge {
            display:inline-block; padding:3px 10px; border-radius:6px; font-size:0.74rem;
            font-weight:500; background:var(--surface2); border:1px solid var(--border); color:var(--text);
        }
        .normal-text { color:#065f46; font-size:0.8rem; font-weight:500; }
        .use-text { color:var(--text-muted); font-size:0.82rem; line-height:1.4; }
        .empty-state { text-align:center; padding:64px 24px; color:var(--text-muted); }
        .empty-state i { font-size:3rem; opacity:0.3; margin-bottom:12px; display:block; }

        /* SAFETY */
        .section-title {
            font-weight:700; font-size:1.3rem; color:var(--primary);
            margin-bottom:20px; display:flex; align-items:center; gap:10px;
        }
        html[lang="ar"] .section-title { font-family:'Tajawal',sans-serif; }
        html[lang="en"] .section-title { font-family:'Syne',sans-serif; }
        .safety-card { background:var(--surface); border-radius:var(--radius); padding:28px; box-shadow:var(--shadow); margin-bottom:20px; }
        .safety-item { display:flex; gap:16px; padding:18px 0; border-bottom:1px solid var(--border); }
        .safety-item:last-child { border-bottom:none; padding-bottom:0; }
        .safety-icon-wrap { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1.1rem; }
        .si-danger{background:#fce4ec;color:var(--danger)} .si-warning{background:#fff3e0;color:var(--warning)}
        .si-success{background:#e8f5e9;color:#2e7d32} .si-info{background:#e3f2fd;color:#1565c0}
        .si-bio{background:#fbe9e7;color:#bf360c} .si-dark{background:#eceff1;color:#37474f}
        .safety-content h6 { font-weight:700; margin-bottom:6px; color:var(--text); font-size:0.92rem; }
        .safety-content p { font-size:0.85rem; color:var(--text-muted); margin:0; line-height:1.6; }
        .side-card { background:var(--surface); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:20px; }
        .standards-list { list-style:none; padding:0; margin:0; }
        .standards-list li { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.88rem; font-weight:600; color:var(--primary); }
        .standards-list li:last-child { border-bottom:none; }
        .standards-list li::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
        .reporting-card { background:linear-gradient(135deg,var(--primary) 0%,#1a3a5c 100%); color:white; border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:20px; }
        .reporting-card .section-title { color:white; }
        .reporting-steps { list-style:none; padding:0; margin:0; }
        .reporting-steps li { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); font-size:0.85rem; }
        .reporting-steps li:last-child { border-bottom:none; }
        .step-num { width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.75rem; flex-shrink:0; }
        .waste-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm); margin-bottom:8px; font-size:0.83rem; font-weight:500; }
        .waste-red{background:#fce4ec;color:#880e4f} .waste-black{background:#eceff1;color:#212121}
        .waste-yellow{background:#fffde7;color:#f57f17} .waste-blue{background:#e3f2fd;color:#0d47a1}
        .alert-card { background:#fff8e1; border:1.5px solid #ffd54f; border-radius:var(--radius-sm); padding:14px 16px; font-size:0.83rem; color:#5d4037; line-height:1.5; }
        .alert-card strong { color:#e65100; display:block; margin-bottom:6px; }

        /* NEWS */
        .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
        .news-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; transition:transform 0.25s,box-shadow 0.25s; text-decoration:none; color:var(--text); display:flex; flex-direction:column; }
        .news-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); color:var(--text); }
        .news-card-header { padding:28px 24px 16px; display:flex; flex-direction:column; align-items:flex-start; gap:14px; }
        .news-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
        .news-card h5 { font-weight:700; font-size:0.95rem; margin:0; line-height:1.4; }
        .news-card p { font-size:0.83rem; color:var(--text-muted); margin:0; line-height:1.5; }
        .news-card-footer { padding:14px 24px; border-top:1px solid var(--border); margin-top:auto; display:flex; justify-content:space-between; align-items:center; }
        .visit-link { font-size:0.82rem; font-weight:600; color:var(--accent); text-decoration:none; display:flex; align-items:center; gap:6px; }

        /* FOOTER */
        .footer { background:var(--primary); background-image:radial-gradient(ellipse at 0% 100%,rgba(0,180,216,0.12) 0%,transparent 50%); color:white; padding:48px 0 32px; margin-top:60px; }
        html[lang="ar"] .footer h4 { font-family:'Tajawal',sans-serif; }
        html[lang="en"] .footer h4 { font-family:'Syne',sans-serif; }
        .footer h4 { font-weight:700; font-size:1.2rem; margin-bottom:6px; }
        .footer p { color:rgba(255,255,255,0.6); font-size:0.88rem; }
        .footer-social a { width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,0.1); display:inline-flex; align-items:center; justify-content:center; color:white; text-decoration:none; margin:0 6px; font-size:1.1rem; transition:background 0.2s,transform 0.2s; }
        .footer-social a:hover { background:var(--accent); transform:translateY(-2px); }
        .footer-copy { color:rgba(255,255,255,0.35); font-size:0.78rem; }

        .wa-float { position:fixed; bottom:24px; width:56px; height:56px; background:#25d366; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:1.6rem; box-shadow:0 4px 20px rgba(37,211,102,0.45); text-decoration:none; transition:transform 0.2s; z-index:999; }
        html[lang="ar"] .wa-float { left:24px; }
        html[lang="en"] .wa-float { right:24px; }
        .wa-float:hover { transform:scale(1.1); color:white; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        .fade-up{animation:fadeUp 0.45s ease both} .fade-up-1{animation-delay:0.05s} .fade-up-2{animation-delay:0.12s} .fade-up-3{animation-delay:0.2s}
        @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
        .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block;animation:pulse-dot 1.6s infinite;margin-left:6px}
        @media(max-width:768px){.hero{padding:40px 0 60px}.chip{font-size:0.72rem;padding:5px 12px}.lab-table{font-size:0.8rem}.lab-table td{padding:10px}}
    </style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
    <div class="container">
        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('ar')" id="btn-ar">العربية</button>
            <button class="lang-btn" onclick="setLang('en')" id="btn-en">English</button>
        </div>
    </div>
</div>

<!-- HERO -->
<header class="hero text-center">
    <div class="container">
        <div class="fade-up">
            <div class="hero-badge">
                <span class="live-dot"></span>
                <span data-ar="بوابة مرجعية متخصصة في علوم المختبرات" data-en="Specialized Medical Laboratory Reference Portal"></span>
            </div>
        </div>
        <h1 class="fade-up fade-up-1">
            <span data-ar="بوابة علوم " data-en="Medical Lab "></span><span><span data-ar="المختبرات الطبية" data-en="Science Portal"></span></span>
        </h1>
        <p class="fade-up fade-up-2">
            <span data-ar="الدليل الشامل للفحوصات المخبرية ومعايير السلامة العالمية — إعداد أ. مأمون السعودي" data-en="The comprehensive guide to laboratory tests and international safety standards — By Mamoun Al-Saudi MLS"></span>
        </p>
        <div class="fade-up fade-up-3">
            <a href="https://t.me/alshamelmls" target="_blank" class="telegram-btn">
                <i class="fab fa-telegram-plane"></i>
                <span data-ar="انضم لقناة التلغرام: alshamelmls" data-en="Join Telegram: alshamelmls"></span>
            </a>
        </div>
        <div class="hero-stats fade-up fade-up-3">
            <div class="hero-stat"><span class="num" id="totalCount">310+</span><span class="lbl" data-ar="فحص مخبري" data-en="Lab Tests"></span></div>
            <div class="hero-divider"></div>
            <div class="hero-stat"><span class="num">11</span><span class="lbl" data-ar="تخصص" data-en="Specialties"></span></div>
            <div class="hero-divider"></div>
            <div class="hero-stat"><span class="num">ISO</span><span class="lbl" data-ar="معايير دولية" data-en="Int'l Standards"></span></div>
            <div class="hero-divider"></div>
            <div class="hero-stat"><span class="num">2026</span><span class="lbl" data-ar="محدّث" data-en="Updated"></span></div>
        </div>
    </div>
</header>

<!-- NAV -->
<div class="main-nav-wrap">
    <div class="container">
        <div class="main-nav">
            <button class="nav-btn active" onclick="switchTab('directory',this)">
                <span>🔬</span><span data-ar="دليل الفحوصات" data-en="Test Directory"></span>
            </button>
            <button class="nav-btn" onclick="switchTab('safety',this)">
                <span>🛡️</span><span data-ar="السلامة المهنية" data-en="Lab Safety"></span>
            </button>
            <button class="nav-btn" onclick="switchTab('news',this)">
                <span>🌐</span><span data-ar="مصادر علمية" data-en="Resources"></span>
            </button>
        </div>
    </div>
</div>

<!-- CONTENT -->
<main class="container py-4">

    <!-- DIRECTORY TAB -->
    <div id="tab-directory" class="tab-pane active">
        <div class="search-section">
            <div class="search-title" id="searchTitle"></div>
            <div class="search-input-wrap">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input">
            </div>
            <div class="filter-chips">
                <button class="chip active" onclick="setFilter('All',this)" data-ar="الكل" data-en="All"></button>
                <button class="chip" onclick="setFilter('Hematology',this)">🩸 Hematology</button>
                <button class="chip" onclick="setFilter('Chemistry',this)">🧪 Chemistry</button>
                <button class="chip" onclick="setFilter('Hormones',this)">💊 Hormones</button>
                <button class="chip" onclick="setFilter('Coagulation',this)">🩹 Coagulation</button>
                <button class="chip" onclick="setFilter('Immunology',this)">🦠 Immunology</button>
                <button class="chip" onclick="setFilter('Microbiology',this)">🔭 Microbiology</button>
                <button class="chip" onclick="setFilter('TumorMarkers',this)">🎗️ Tumor Markers</button>
                <button class="chip" onclick="setFilter('Genetic',this)">🧬 Genetic</button>
                <button class="chip" onclick="setFilter('Toxicology',this)">⚗️ Toxicology</button>
                <button class="chip" onclick="setFilter('BloodBank',this)">🏥 Blood Bank</button>
                <button class="chip" onclick="setFilter('Urinalysis',this)">💧 Urinalysis</button>
            </div>
            <div class="results-count" id="resultsCount"></div>
        </div>
        <div class="table-card">
            <div class="table-responsive">
                <table class="table lab-table">
                    <thead><tr id="tableHeaders"></tr></thead>
                    <tbody id="testTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- SAFETY TAB -->
    <div id="tab-safety" class="tab-pane">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="safety-card">
                    <div class="section-title">
                        <i class="fas fa-biohazard" style="color:var(--danger)"></i>
                        <span data-ar="بروتوكول السلامة العامة" data-en="General Safety Protocol"></span>
                    </div>
                    <div class="safety-item">
                        <div class="safety-icon-wrap si-danger"><i class="fas fa-shield-alt"></i></div>
                        <div class="safety-content">
                            <h6 data-ar="1. معدات الحماية الشخصية (PPE)" data-en="1. Personal Protective Equipment (PPE)"></h6>

// ===== I18N =====
let lang = 'ar';

const i18n = {
    ar: {
        searchTitle: '🔍 البحث في قاعدة الفحوصات',
        searchPlaceholder: 'ابحث بالاسم، التخصص، العينة، أو الاستخدام...',
        showing: (n, t) => `عرض <strong>${n}</strong> فحص من أصل <strong>${t}</strong>`,
        noResults: 'لا توجد نتائج مطابقة للبحث',
        headers: ['اسم الفحص','التخصص','العينة المطلوبة','القيم الطبيعية','الاستخدامات']
    },
    en: {
        searchTitle: '🔍 Search the Test Database',
        searchPlaceholder: 'Search by name, specialty, sample, or indication...',
        showing: (n, t) => `Showing <strong>${n}</strong> of <strong>${t}</strong> tests`,
        noResults: 'No matching results found',
        headers: ['Test Name','Specialty','Sample Required','Normal Values','Indications']
    }
};

function setLang(l) {
    lang = l;
    const html = document.getElementById('htmlRoot');
    html.setAttribute('lang', l);
    html.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    document.getElementById('btn-ar').classList.toggle('active', l === 'ar');
    document.getElementById('btn-en').classList.toggle('active', l === 'en');

    // Translate all [data-ar/en] elements
    document.querySelectorAll('[data-ar]').forEach(el => {
        el.textContent = l === 'ar' ? el.dataset.ar : el.dataset.en;
    });

    // Search input placeholder
    document.getElementById('searchInput').placeholder = i18n[l].searchPlaceholder;
    // Search title
    document.getElementById('searchTitle').textContent = i18n[l].searchTitle;
    // Table headers
    const headers = document.getElementById('tableHeaders');
    headers.innerHTML = i18n[l].headers.map(h => `<th>${h}</th>`).join('');

    filterData();
}

// ===== TABLE =====
let activeFilter = 'All';
let searchTerm = '';

function renderTable(data) {
    const tbody = document.getElementById('testTableBody');
    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-search"></i><p>${i18n[lang].noResults}</p></div></td></tr>`;
    } else {
        tbody.innerHTML = data.map(t => `<tr>
            <td><div class="test-name">${t.name}</div></td>
            <td><span class="cat-badge cat-${t.cat}">${t.cat}</span></td>
            <td><span class="sample-badge">${t.sample}</span></td>
            <td><span class="normal-text">${t.normal}</span></td>
            <td><span class="use-text">${t.use}</span></td>
        </tr>`).join('');
    }
    document.getElementById('resultsCount').innerHTML = i18n[lang].showing(data.length, testsData.length);
}

function filterData() {
    const t = searchTerm.toLowerCase();
    const filtered = testsData.filter(x =>
        (activeFilter === 'All' || x.cat === activeFilter) &&
        (!t || x.name.toLowerCase().includes(t) || x.cat.toLowerCase().includes(t) || x.use.toLowerCase().includes(t) || x.sample.toLowerCase().includes(t))
    );
    renderTable(filtered);
}

function setFilter(cat, el) {
    activeFilter = cat;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filterData();
}

function switchTab(tab, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
}

document.getElementById('searchInput').addEventListener('input', e => { searchTerm = e.target.value; filterData(); });
document.getElementById('totalCount').textContent = testsData.length + '+';

// Init
setLang('ar');
</script>
</body>
